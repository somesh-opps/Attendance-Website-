<!DOCTYPE html>
<html class="light dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Account Creation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#359EFF",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923"
                    },
                    fontFamily: {
                        display: "Lexend"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        html {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex min-h-screen w-full items-center justify-center p-4">
<div class="grid w-full max-w-6xl grid-cols-1 overflow-hidden rounded-xl bg-white shadow-lg dark:bg-gray-800 lg:grid-cols-2">
<div class="flex flex-col justify-center p-8 sm:p-12">
<div class="w-full text-center mb-8">
<h1 class="text-gray-900 dark:text-white text-4xl font-black leading-tight tracking-[-0.033em]">Create Your Account</h1>
<p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-normal mt-2">Join TechUni's Attendance Portal</p>
</div>
<div class="w-full space-y-6">
<div class="flex flex-col">
<label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="full-name">Full Name</label>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 text-base font-normal leading-normal transition-shadow" id="full-name" placeholder="Enter your full name" type="text"/>
</div>
<div class="flex flex-col">
<label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="user-id">Student ID / Faculty ID</label>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 text-base font-normal leading-normal transition-shadow" id="user-id" placeholder="Enter your ID number" type="text"/>
</div>
<div class="flex flex-col">
<label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="email">Email</label>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 text-base font-normal leading-normal transition-shadow" id="email" placeholder="Enter your email address" type="email"/>
</div>
<div class="flex flex-col">
<label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="password">Password</label>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 pr-12 text-base font-normal leading-normal transition-shadow" id="password" placeholder="Create a password" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col">
<label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="role">Role</label>
<select class="form-select flex w-full min-w-0 flex-1 cursor-pointer appearance-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 p-4 text-base font-normal leading-normal transition-shadow" id="role">
<option>Select your role</option>
<option>Student</option>
<!-- <option>Faculty</option> -->
</select>
</div>
<button class="flex w-full min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-4 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors shadow-sm">
<span class="truncate">Register</span>
</button>
</div>
<p class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
                    Already have an account? <a class="font-medium text-primary hover:underline" href="Login.html">LogIn</a>
</p>
</div>
<div class="relative hidden lg:block">
<img alt="University campus building" class="absolute inset-0 h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCokyg0aeK6YVmICtGt40Dn0rYkS4XGWzkSB6DKWdfcTtl6JTJdAuAStx00ScQ1EedJWrkUmphX1PsOXbEKA8KDfnu65oX5U4CUfxR3MEOwK1Ihn93gO3wICTvzqGZwq1voNQz3c-FopKE-YNAL9uh0bXy0idnB2CfdlNTshnbbfZ14Q6M5SLaqjaFMlnVUtufXhXL1vhGUuHfMX2y5XBr4qNqU2QMJ7aAWNJHgNvSY5WbE7mARKn5lGAovrkxw4m_WjC3Yt8V42Ig"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
<div class="relative flex h-full flex-col justify-end p-8 text-white">
<h2 class="text-3xl font-bold">Streamline Your Attendance Tracking</h2>
<p class="mt-2 text-gray-200">Efficient, reliable, and modern. Join our community and stay on top of your schedule effortlessly.</p>
</div>
</div>
</div>
</div>

<script src="account_creation.js"></script>
</body></html>
