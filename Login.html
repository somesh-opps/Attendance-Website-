<!DOCTYPE html>

<html class="light dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#359EFF", "background-light": "#f5f7f8", "background-dark": "#0f1923"}, fontFamily: {display: "Lexend"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        html {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
    <div class="relative flex min-h-screen w-full items-center justify-center p-4">
        <div class="grid w-full max-w-6xl grid-cols-1 overflow-hidden rounded-xl bg-white shadow-lg dark:bg-gray-800 lg:grid-cols-2 min-h-[600px]">
            <div class="flex flex-col justify-center p-8 sm:p-12">
                <div class="w-full text-center mb-8">
                    <h1 class="text-gray-900 dark:text-white text-4xl font-black leading-tight tracking-[-0.033em]">Welcome Back</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-normal mt-2">Log in to your account</p>
                </div>
                <div class="w-full space-y-6">
                    <div class="flex flex-col">
                        <label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="student-id">Student ID</label>
                        <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 text-base font-normal leading-normal transition-shadow" id="student-id" placeholder="Enter your Student ID" type="text"/>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-gray-900 dark:text-gray-200 text-base font-medium leading-normal pb-2" for="password">Password</label>
                        <div class="relative">
                            <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-gray-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-gray-500 dark:placeholder:text-gray-400 p-4 pr-12 text-base font-normal leading-normal transition-shadow" id="password" placeholder="Enter your password" type="password"/>
                            <button class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" type="button">
                                <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-end w-full">
                        <a class="text-primary text-sm font-normal leading-normal underline hover:text-primary/80" href="Password_reset.html">Forgot Password?</a>
                    </div>
                    <button class="flex w-full min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-4 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors shadow-sm">
                        <span class="truncate">Login</span>
                    </button>
                </div>
                <p class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
                    Don't have an account? <a class="font-medium text-primary hover:underline" href="Account_Creation.html">Create an Account</a>
                </p>
            </div>
            <div class="relative hidden lg:block">
                <img alt="University campus with students walking." class="absolute inset-0 h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk3CODszHthO2Sj4I3o3PZHBjoSCxKSfoqnvPkM4ae4kmxE_f8BdWl4wxeC0_OrJl93vg-UPHM3KNEzvVovED73kYzlWW25go5h-sXC0YCTWMBjFomU9M8TI3KxXaS2w1YIIq9-9P9Bvpi7iLEgX1i2NPc_4XBakIJOsU_LBmmjfS91RF221YAsM4NktPaEpgBNZoQ4XjxQu2NEzljf6fToYePKhgkgNfrKBmCsfA0UhwxzYjyGzruxgs2Ef9e2ApY7K2h_DJZe6g"/>
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                <div class="relative flex h-full flex-col justify-end p-8 text-white">
                    <h2 class="text-3xl font-bold">Welcome Back to EduAttend</h2>
                    <p class="mt-2 text-gray-200">Access your attendance records and stay updated with your academic progress.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body></html>
